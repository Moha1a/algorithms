name: monfathak_flutter
description: Monfathak Flutter client
publish_to: 'none'
version: 1.0.4+38

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  crypto: ^3.0.6
  firebase_messaging: ^15.1.6
  firebase_crashlytics: ^4.1.6
  flutter_local_notifications: ^18.0.1
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/monfathak_logo.png
