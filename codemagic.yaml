workflows:
  ios-preview:
    name: iOS Simulator Preview
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install iOS pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS simulator app
        script: |
          flutter build ios --debug --simulator --dart-define=APP_PREVIEW_SAFE_MODE=true

    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - build/ios/iphonesimulator/Runner.app.zip