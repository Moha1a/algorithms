<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>منفذك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Changa:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
      <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="app"><section class="card" style="margin-top:24px;text-align:center;"><h2>جاري تحميل التطبيق...</h2><p class="muted">إذا استمر ظهور هذه الشاشة، تحقق من إعدادات Netlify واسم النطاق المضاف في Firebase.</p></section></div>
    <script>
      window.addEventListener("unhandledrejection", function () {
        var app = document.getElementById("app");
        if (app && !app.dataset.booted) {
          app.innerHTML = "<section class=\"card\" style=\"margin-top:24px;text-align:center;\"><h2>تعذر تشغيل التطبيق</h2><p class=\"muted\">تحقق من إعدادات Netlify واسم النطاق المصرح به داخل Firebase Authentication.</p></section>";
        }
      });
    </script>
    <script src="https://js.stripe.com/v3/"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
